version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: control_ui
      POSTGRES_USER: control
      POSTGRES_PASSWORD: control
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U control -d control_ui"]
      interval: 5s
      timeout: 3s
      retries: 5

  bff:
    build: ./bff
    network_mode: host
    environment:
      PORT: "4100"
      DATABASE_URL: "postgres://control:control@127.0.0.1:5433/control_ui"
      COOKIE_SECRET: "$(openssl rand -hex 32)"
      OPENCLAW_GATEWAY_URL: "http://127.0.0.1:18789"
      NODE_ENV: production
      HOME: "/home/ec2-user"
    volumes:
      - /home/ec2-user/.openclaw/openclaw.json:/home/ec2-user/.openclaw/openclaw.json:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3100:80"
    depends_on:
      - bff

volumes:
  db-data:
    name: openclaw-control-ui_control-db-data
    external: true
